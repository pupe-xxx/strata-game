<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STRATA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="logo">STRATA</div>
      <div id="header-info">
        <span id="turn-display">ターン 1</span>
        <button id="btn-log-popup" class="mobile-only">ログ</button>
      </div>
    </header>

    <div id="game-layout">

      <!-- ===== LEFT PANEL (PC: log/piece-info | Mobile: 3-tab) ===== -->
      <aside id="info-panel">

        <!-- Mobile tab buttons (2 tabs only) -->
        <div id="info-tabs" class="mobile-only">
          <button class="info-tab active" data-tab="you">あなた</button>
          <button class="info-tab" data-tab="cpu">相手</button>
        </div>

        <!-- Tab: あなた / PC: ログ -->
        <div id="tab-you-panel" class="tab-panel">
          <div id="pc-log-area" class="pc-only">
            <div class="section-title">ログ</div>
            <div id="log-list"></div>
          </div>
          <div class="mobile-only">
            <div class="piece-list" id="mob-p1-pieces"></div>
            <div class="hand-area" id="mob-p1-hand"></div>
          </div>
        </div>

        <!-- Tab: 相手 (mobile only) -->
        <div id="tab-cpu-panel" class="tab-panel" style="display:none">
          <div class="piece-list" id="mob-p2-pieces"></div>
          <div class="hand-area" id="mob-p2-hand"></div>
        </div>

        <!-- Tab: 選択中 / PC: 駒詳細 -->
        <div id="tab-selected-panel" class="tab-panel" style="display:none">
          <div id="info-empty">駒をクリックすると<br>詳細が表示されます</div>
          <div id="info-content" style="display:none">
            <div id="info-name"></div>
            <div id="info-owner"></div>
            <div id="info-hp"></div>
            <div id="info-status" class="info-status"></div>
            <hr class="info-divider">
            <div class="info-label">移動</div>
            <div id="info-move" class="info-value"></div>
            <div class="info-label">攻撃</div>
            <div id="info-attack" class="info-value"></div>
            <div class="info-label">地形変形</div>
            <div id="info-terrain" class="info-value"></div>
            <div class="info-label">スキル</div>
            <div id="info-skill" class="info-value skill-value"></div>
            <hr class="info-divider">
            <div class="info-label">特性</div>
            <div id="info-trait" class="info-value trait-value"></div>
          </div>
        </div>

      </aside>

      <!-- ===== BOARD + CONTROLS ===== -->
      <div id="board-wrapper">
        <canvas id="game-canvas"></canvas>
        <div id="message-bar">駒を選択してください</div>

        <div id="controls-row">
          <!-- Row 1: view controls -->
          <div class="ctrl-row ctrl-row-1">
            <div id="layer-toggle">
              <button id="btn-surface" class="layer-btn active">表層</button>
              <button id="btn-depth"   class="layer-btn">深層</button>
            </div>
            <div id="view-dir-btns">
              <button class="view-btn" data-dir="0">↑N</button>
              <button class="view-btn" data-dir="1">→E</button>
              <button class="view-btn" data-dir="2">↓S</button>
              <button class="view-btn" data-dir="3">←W</button>
            </div>
          </div>

          <!-- Row 2: actions -->
          <div class="ctrl-row ctrl-row-2">
            <div id="action-inline">
              <div id="action-btns">
                <button class="act-btn" id="btn-move"        disabled>移動</button>
                <button class="act-btn" id="btn-attack"      disabled>攻撃</button>
                <button class="act-btn" id="btn-terrain"     disabled>地形</button>
                <button class="act-btn" id="btn-transit"     disabled>層移動</button>
                <button class="act-btn" id="btn-skill"       disabled>スキル</button>
                <button class="act-btn" id="btn-pass-action">パス</button>
              </div>
              <div id="terrain-menu" style="display:none">
                <button class="terrain-opt" data-dir="up">凸（壁）</button>
                <button class="terrain-opt" data-dir="down">凹（穴）</button>
                <button class="terrain-opt" id="btn-terrain-cancel">×</button>
              </div>
            </div>

            <div id="slots-confirm">
              <div id="slots">
                <div class="slot" id="slot-0"><span class="slot-num">①</span><span class="slot-text">未設定</span><button class="slot-clear" data-idx="0" style="display:none">✕</button></div>
                <div class="slot" id="slot-1"><span class="slot-num">②</span><span class="slot-text">未設定</span><button class="slot-clear" data-idx="1" style="display:none">✕</button></div>
              </div>
              <div id="confirm-area">
                <button id="btn-confirm" disabled>ターン確定</button>
                <button id="btn-deselect">解除</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== SIDE PANEL ===== -->
      <aside id="side-panel">

        <!-- CPU status (PC only) -->
        <section class="player-section pc-only" id="p2-section">
          <div class="player-label cpu-label">CPU</div>
          <div class="hand-area" id="p2-hand"></div>
          <div class="piece-list" id="p2-pieces"></div>
        </section>

        <!-- Occupation counters -->
        <section id="occ-section">
          <div class="section-title">占領状況</div>
          <div class="occ-row">
            <span class="occ-key occ-A-key">A</span>
            <div class="occ-bar-wrap">
              <div class="occ-bar p1-bar" id="occ-A-p1-bar"></div>
              <div class="occ-bar p2-bar" id="occ-A-p2-bar"></div>
            </div>
            <span class="occ-count" id="occ-A-count">0 / 0</span>
          </div>
          <div class="occ-row">
            <span class="occ-key occ-B-key">B1</span>
            <div class="occ-bar-wrap">
              <div class="occ-bar p1-bar" id="occ-B0-p1-bar"></div>
              <div class="occ-bar p2-bar" id="occ-B0-p2-bar"></div>
            </div>
            <span class="occ-count" id="occ-B0-count">0 / 0</span>
          </div>
          <div class="occ-row">
            <span class="occ-key occ-B-key">B2</span>
            <div class="occ-bar-wrap">
              <div class="occ-bar p1-bar" id="occ-B1-p1-bar"></div>
              <div class="occ-bar p2-bar" id="occ-B1-p2-bar"></div>
            </div>
            <span class="occ-count" id="occ-B1-count">0 / 0</span>
          </div>
          <div class="victory-hint">A+B同時 <b>5T</b> / A単独 <b>8T</b> で勝利</div>
          <div class="victory-hint" id="b-move-timer">B移動: 5T後</div>
          <div id="victory-warn" style="display:none"></div>
        </section>

        <!-- DCP status -->
        <section id="dcp-section">
          <div class="section-title">DCP（深層制圧）</div>
          <div class="dcp-row">
            <span class="dcp-label">α 任意浮上</span>
            <span class="dcp-status" id="dcp-alpha">—</span>
          </div>
          <div class="dcp-row">
            <span class="dcp-label">β 地形2段</span>
            <span class="dcp-status" id="dcp-beta">—</span>
          </div>
          <div class="dcp-row">
            <span class="dcp-label">γ 即時復活</span>
            <span class="dcp-status" id="dcp-gamma">—</span>
          </div>
        </section>

        <!-- Player 1 status (PC only) -->
        <section class="player-section pc-only" id="p1-section">
          <div class="player-label you-label">あなた</div>
          <div class="piece-list" id="p1-pieces"></div>
          <div class="hand-area" id="p1-hand"></div>
        </section>

        <!-- Mobile: action buttons (shown when piece selected) -->
        <section id="mob-action-section">
          <div id="mob-action-btns">
            <button class="act-btn mob-act" id="mob-btn-move"    disabled>移動</button>
            <button class="act-btn mob-act" id="mob-btn-attack"  disabled>攻撃</button>
            <button class="act-btn mob-act" id="mob-btn-terrain" disabled>地形</button>
            <button class="act-btn mob-act" id="mob-btn-transit" disabled>層移動</button>
            <button class="act-btn mob-act" id="mob-btn-skill"   disabled>スキル</button>
            <button class="act-btn mob-act" id="mob-btn-pass">パス</button>
          </div>
          <div id="mob-terrain-menu" style="display:none">
            <button class="terrain-opt" data-mob-dir="up">凸（壁）</button>
            <button class="terrain-opt" data-mob-dir="down">凹（穴）</button>
            <button class="terrain-opt" id="mob-btn-terrain-cancel">×</button>
          </div>
        </section>

      </aside>
    </div>

    <!-- Game Over overlay -->
    <div id="gameover-overlay" style="display:none">
      <div id="gameover-box">
        <div id="gameover-title">GAME OVER</div>
        <div id="gameover-msg"></div>
        <button id="btn-restart">もう一度プレイ</button>
      </div>
    </div>

    <!-- Log popup (mobile) -->
    <div id="log-popup" style="display:none">
      <div id="log-popup-box">
        <div id="log-popup-header">
          <span>ログ</span>
          <button id="btn-close-log">✕</button>
        </div>
        <div id="log-popup-list"></div>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/cpu.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
