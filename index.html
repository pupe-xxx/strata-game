<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STRATA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="logo">STRATA</div>
      <div id="header-info">
        <span id="turn-display">ターン 1</span>
        <button id="btn-log-popup" class="mobile-only">ログ</button>
        <button id="btn-piece-info" class="mobile-only" style="display:none">駒情報</button>
      </div>
    </header>

    <div id="game-layout">

      <!-- ===== COL 1: 詳細バー ===== -->
      <aside id="info-panel">
        <div id="info-tabs" class="mobile-only">
          <button class="info-tab active" data-tab="you">あなた</button>
          <button class="info-tab" data-tab="cpu">相手</button>
        </div>
        <div id="tab-you-panel" class="tab-panel">
          <div id="pc-log-area" class="pc-only">
            <div class="section-title">ログ</div>
            <div id="log-list"></div>
          </div>
          <div class="mobile-only">
            <div class="piece-list" id="mob-p1-pieces"></div>
            <div class="hand-area" id="mob-p1-hand"></div>
          </div>
        </div>
        <div id="tab-cpu-panel" class="tab-panel" style="display:none">
          <div class="piece-list" id="mob-p2-pieces"></div>
          <div class="hand-area" id="mob-p2-hand"></div>
        </div>
        <div id="tab-selected-panel" class="tab-panel" style="display:none">
          <div id="info-empty">駒をクリックすると<br>詳細が表示されます</div>
          <div id="info-content" style="display:none">
            <div id="info-name"></div>
            <div id="info-owner"></div>
            <div id="info-hp"></div>
            <div id="info-status" class="info-status"></div>
            <hr class="info-divider">
            <div class="info-label">移動</div>
            <div id="info-move" class="info-value"></div>
            <div class="info-label">攻撃</div>
            <div id="info-attack" class="info-value"></div>
            <div class="info-label">地形変形</div>
            <div id="info-terrain" class="info-value"></div>
            <div class="info-label">スキル</div>
            <div id="info-skill" class="info-value skill-value"></div>
            <hr class="info-divider">
            <div class="info-label">特性</div>
            <div id="info-trait" class="info-value trait-value"></div>
          </div>
        </div>
      </aside>

      <!-- ===== COL 2: 盤エリア ===== -->
      <div id="board-wrapper">

        <!-- 占領UI HUD (PC only / position:absolute) -->
        <div id="occ-float" class="pc-only">
          <div id="layer-indicator" class="surface">● 表層</div>
          <section id="occ-section">
            <div id="occ-score-row">
              <div id="occ-score-display" class="occ-score">あなた 0pt  /  CPU 0pt</div>
              <button id="btn-occ-toggle" class="mobile-only occ-toggle-btn">▼</button>
            </div>
            <div id="occ-detail">
              <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; margin-top:4px;">
                <div class="section-title" style="margin-bottom:0; border:none; padding:0;">占領状況</div>
                <div class="victory-hint" style="margin:0;">先取 <b>5点</b> / 30T上限</div>
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px;">
                <div>
                  <div style="font-size:0.7rem; color:#26c6da; font-weight:bold; margin-bottom:3px;">エコーポイント</div>
                  <div class="occ-row">
                    <span class="occ-key" style="color:#26c6da">E表</span>
                    <span class="occ-count" id="echo-surface-count" style="margin-left:auto">—</span>
                  </div>
                  <div class="occ-row">
                    <span class="occ-key" style="color:#26c6da">E深</span>
                    <span class="occ-count" id="echo-depth-count" style="margin-left:auto">—</span>
                  </div>
                </div>
                <div>
                  <div style="font-size:0.7rem; color:var(--text-dim); margin-bottom:3px;">タイマー</div>
                  <div class="victory-hint" id="echo-hold-timer">保持: 0/3T</div>
                  <div class="victory-hint" id="echo-cycle-timer">サイクル残: 10T</div>
                </div>
              </div>
              <div id="victory-warn" style="display:none"></div>
            </div>
          </section>
        </div>

        <!-- キャンバス（中央配置） -->
        <canvas id="game-canvas"></canvas>

        <!-- アクションUI HUD (PC: position:absolute / Mobile: JSでctrl領域へ移動) -->
        <div id="action-float">
          <!-- メッセージバー（action-float先頭） -->
          <div id="message-bar">駒を選択してください</div>
          <!-- 層切り替え (mobile only) -->
          <div id="layer-toggle" class="mobile-only">
            <button id="btn-surface" class="layer-btn active">表層</button>
            <button id="btn-depth"   class="layer-btn">深層</button>
          </div>

          <!-- スロット -->
          <div id="slots">
            <div class="slot" id="slot-0" draggable="true"><span class="slot-num">①</span><span class="slot-text">未設定</span><button class="slot-clear" data-idx="0" style="display:none">✕</button></div>
            <div class="slot" id="slot-1" draggable="true"><span class="slot-num">②</span><span class="slot-text">未設定</span><button class="slot-clear" data-idx="1" style="display:none">✕</button></div>
          </div>

          <!-- ターン確定 / 地形メニュー（左5/6） + メモボタン（右1/6） -->
          <div id="confirm-zone">
            <div id="confirm-main">
              <button id="btn-confirm" disabled>ターン確定</button>
              <div id="terrain-menu" style="display:none">
                <button class="terrain-opt" data-dir="up"   id="btn-terrain-up">凸（壁）</button>
                <button class="terrain-opt" data-dir="down" id="btn-terrain-down">凹（穴）</button>
              </div>
            </div>
            <button id="btn-memo" class="act-btn">メモ</button>
          </div>

          <!-- アクションボタン -->
          <div id="action-btns">
            <button class="act-btn" id="btn-terrain"     disabled>地形</button>
            <button class="act-btn" id="btn-transit"     disabled>層移動</button>
            <button class="act-btn" id="btn-skill"       disabled>スキル</button>
            <button class="act-btn" id="btn-vine"        disabled>🌿蔦</button>
            <button class="act-btn" id="btn-react"       disabled>⚡反応</button>
            <button class="act-btn" id="btn-pass-action">パス</button>
          </div>

          <div id="roller-menu" style="display:none">
            <button class="roller-opt" data-rtype="LIGHT">🛞軽(2T)</button>
            <button class="roller-opt" data-rtype="HEAVY">🛞重(3T)</button>
            <button id="btn-roller-cancel">×</button>
          </div>
        </div>

      </div>

      <!-- ===== COL 3: 駒情報 ===== -->
      <aside id="side-panel">
        <section class="player-section pc-only" id="p2-section">
          <div class="player-label cpu-label">CPU</div>
          <div class="hand-area" id="p2-hand"></div>
          <div class="piece-list" id="p2-pieces"></div>
        </section>

        <section class="player-section pc-only" id="p1-section">
          <div class="player-label you-label">あなた</div>
          <div class="piece-list" id="p1-pieces"></div>
          <div class="hand-area" id="p1-hand"></div>
        </section>

        <!-- Mobile: action buttons (shown when piece selected) -->
        <section id="mob-action-section">
          <div id="mob-action-btns">
            <button class="act-btn mob-act" id="mob-btn-terrain" disabled>地形</button>
            <button class="act-btn mob-act" id="mob-btn-transit" disabled>層移動</button>
            <button class="act-btn mob-act" id="mob-btn-skill"   disabled>スキル</button>
            <button class="act-btn mob-act" id="mob-btn-vine"    disabled>🌿蔦</button>
            <button class="act-btn mob-act" id="mob-btn-react"   disabled>⚡反応</button>
            <button class="act-btn mob-act" id="mob-btn-pass">パス</button>
          </div>
          <div id="mob-terrain-menu" style="display:none">
            <button class="terrain-opt" data-mob-dir="up"   id="mob-btn-terrain-up">凸（壁）</button>
            <button class="terrain-opt" data-mob-dir="down" id="mob-btn-terrain-down">凹（穴）</button>
          </div>
        </section>
      </aside>

    </div>

    <!-- Game Over overlay -->
    <div id="gameover-overlay" style="display:none">
      <div id="gameover-box">
        <div id="gameover-title">GAME OVER</div>
        <div id="gameover-msg"></div>
        <button id="btn-restart">もう一度プレイ</button>
      </div>
    </div>

    <!-- Log popup (mobile) -->
    <div id="log-popup" class="mob-popup-overlay" style="display:none">
      <div id="log-popup-box" class="mob-popup-box">
        <div id="log-popup-header" class="mob-popup-header">
          <span>ログ</span>
          <button id="btn-close-log" class="mob-popup-close">✕</button>
        </div>
        <div id="log-popup-list" class="mob-popup-body"></div>
      </div>
    </div>

    <!-- 駒情報 popup (mobile) -->
    <div id="piece-info-popup" class="mob-popup-overlay" style="display:none">
      <div id="piece-info-popup-box" class="mob-popup-box">
        <div id="piece-info-popup-header" class="mob-popup-header">
          <span id="pip-name-header">駒情報</span>
          <button id="btn-close-piece-info" class="mob-popup-close">✕</button>
        </div>
        <div id="piece-info-popup-content" class="mob-popup-body">
          <div id="pip-hp"></div>
          <div id="pip-status" class="info-status"></div>
          <hr class="info-divider">
          <div class="info-label">移動</div><div id="pip-move" class="info-value"></div>
          <div class="info-label">攻撃</div><div id="pip-attack" class="info-value"></div>
          <div class="info-label">地形変形</div><div id="pip-terrain" class="info-value"></div>
          <div class="info-label">スキル</div><div id="pip-skill" class="info-value skill-value"></div>
          <hr class="info-divider">
          <div class="info-label">特性</div><div id="pip-trait" class="info-value trait-value"></div>
        </div>
      </div>
    </div>

    <!-- 手持ち popup (mobile) -->
    <div id="hand-popup" class="mob-popup-overlay" style="display:none">
      <div id="hand-popup-box" class="mob-popup-box">
        <div id="hand-popup-header" class="mob-popup-header">
          <span id="hand-popup-title">あなた</span>
          <button id="btn-close-hand" class="mob-popup-close">✕</button>
        </div>
        <div id="hand-popup-content" class="mob-popup-body"></div>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/cpu.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
